<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال رسالة سرية</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            direction: rtl;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #38bdf8;
            font-weight: 700;
        }
        p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        label {
            display: block;
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 1.5px solid #334155;
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>ابعت ميساج سري 🤫</h2>
        <p>اكتب اسمك ورسالتك وراح تلحقني ديريكت للتيليجرام بلا ما يشوفها حتى واحد!</p>
        
        <form id="telegramForm">
            <div class="input-group">
                <label for="username">الاسم (أو خليها فارغة باه تكون مجهول):</label>
                <input type="text" id="username" placeholder="مثلاً: فاعل خير">
            </div>
            
            <div class="input-group">
                <label for="message">الرسالة السرية (تظهر على شكل نقاط):</label>
                <input type="password" id="message" placeholder="••••••••••••" required>
            </div>
            
            <button type="submit">إرسال الرسالة بأمان 🚀</button>
        </form>
    </div>

    <script>
        const TELEGRAM_TOKEN = '8939934721:AAE0B_njzMIAjs9tJq5LnyTvN8PlVqZZnaQ'; 
        const CHAT_ID = '7094930209';

        document.getElementById('telegramForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            let username = document.getElementById('username').value.trim();
            if (username === "") {
                username = "شخص مجهول 👤";
            }
            const message = document.getElementById('message').value;

            const textMessage = `📩 **رسالة سرية جديدة!**\n\n👤 **المرسل:** ${username}\n💬 **الرسالة:** ${message}`;

            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: textMessage,
                    parse_mode: 'Markdown'
                })
            })
            .then(response => response.json())
            .then(data => {
                if(data.ok) {
                    alert('الميساج تلحق ديريكت في التيليجرام وبأمان! ✅');
                    document.getElementById('telegramForm').reset();
                } else {
                    alert('كاين خطأ! عاود جرب لاحقاً. ❌');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('فشل الاتصال بالإنترنت. ❌');
            });
        });
    </script>

</body>
</html>
